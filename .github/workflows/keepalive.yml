name: Keep Render App Awake

on:
  schedule:
    - cron: "*/10 * * * *"  # Every 10 minutes
  workflow_dispatch:

jobs:
  ping-render:
    runs-on: ubuntu-latest

    steps:
      - name: Curl your Render app
        run: |
          curl -s -o /dev/null -w "Status: %{http_code}\n" https://vat-portal-backend-nic.onrender.com/


          